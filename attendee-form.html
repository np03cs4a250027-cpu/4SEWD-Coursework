<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Attendee</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="topbar">
      <h3>Event Hub</h3>
      <p>Admin</p>
    </div>
    <div class="sidebar">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="attendees.html" class="active">Attendees</a></li>
        <li><a href="registration.html">Registrations</a></li>
        <li><a href="login.html">Logout</a></li>
      </ul>
    </div>

    <div class="main">
      <div class="content">
        <h1 style="margin-bottom: 10px">Add New Attendee</h1>

        <div class="form-card">
          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Enter full name" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email address" />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="Enter phone number" />
          </div>

          <button class="btn">Save Attendee</button>
        </div>
      </div>
    </div>
  </body>
</html>
