<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 400px;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .container h1 {
        text-align: center;
        color: #0d47a1;
        margin-bottom: 10px;
      }

      .container p {
        text-align: center;
        color: #666;
        margin-bottom: 25px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .button {
        width: 100%;
        padding: 12px;
        background: #0d47a1;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-bottom: 30px;
      }

      .button:hover {
        background: #1565c0;
      }

      .forgot-password {
        text-align: right;
        margin-top: 10px;
      }

      .forgot-password a {
        text-decoration: none;
        color: #0d47a1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Event Management System</h1>
      <p>Admin Login</p>
      <form>
        <label>Username</label>
        <input type="text" placeholder="Enter username" />
        <br />
        <label>Password</label>
        <input type="password" placeholder="Enter password" />
        <button type="submit" class="button">Login</button>

        <div class="forgot-password">
          <a href="#">Forgot Password?</a>
        </div>
      </form>
    </div>
  </body>
</html>
